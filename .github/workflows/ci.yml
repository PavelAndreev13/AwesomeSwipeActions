name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build -v

      - name: Build (release)
        run: swift build -c release -v

      - name: Test
        run: swift test --parallel
